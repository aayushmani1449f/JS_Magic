<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form>
      <header class="headerContainer"><h1>HTML Form</h1></header>
      <div>
        <label for="text">Enter your name :</label>
        <input type="text" id="text" name="text" />
        <error-output class="text-error" for="text"></error-output>
      </div>
      <div>
        <label for="pwd">Enter pasword :</label>
        <input type="password" id="pwd" name="pwd" />
        <error-output class="pwd-error" for="pwd"></error-output>
      </div>
      <div>
        <label for="url">Enter profile url</label>
        <input type="url" id="url" name="url" />
        <error-output class="url-error" for="url"></error-output>
      </div>
      <div>
        <label for="email">Enter your mail :</label>
        <input type="email" id="email" name="email" />
        <error-output class="email-error" for="email"></error-output>
      </div>
      <div>
        <label for="number">Enter your number :</label>
        <input type="number" id="number" name="number" />
      </div>
      <div>
        <label for="search">Searching for :</label>
        <input type="search" id="search" name="search" />
      </div>
      <div class="nativeDateTimePicker">
        <label for="party">Choose a date and time :</label>
        <input type="datetime-local" id="party" name="bday" />
        <span class="validity"></span>
      </div>
      <div>
        <label for="salary">Choose your salary:</label>
        <input
          type="range"
          name="salary"
          id="salary"
          min="300000"
          max="500000"
          step="100"
          value="400000"
        />
        <output class="salary-output" for="salary">400000</output>
      </div>
      <div>
        <button type="submit">Submit</button>
      </div>
    </form>
    <script src="script.js"></script>
  </body>
</html>

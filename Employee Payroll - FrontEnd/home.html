<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Details Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-content">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="logo" width="40" height="40">
            <div class="logo-text">EMPLOYEE<br><span>PAYROLL</span></div>
        </div>
    </header>

    <div class="container" style="width: 90%; max-width: 1200px;">
        <div class="table-header">
            <h2>Employee Details <span id="emp-count" style="font-size: 16px; color: #888; border: 1px solid #888; border-radius: 50%; padding: 2px 8px; margin-left: 10px;">0</span></h2>
            <div style="display: flex; gap: 20px;">
                <div class="search-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                    </svg>
                    <input type="text" placeholder="Search">
                </div>
                <button class="add-btn" onclick="window.location.href='payroll_form.html'">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
                    </svg> Add User
                </button>
            </div>
        </div>

        <table id="table-display">
            <!-- Table content populated via JS template literals -->
        </table>
    </div>

    <script src="home.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card Layouts</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .card-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 300px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .card-content {
            padding: 20px;
            flex-grow: 1;
        }
        .card-content h3 { margin-top: 0; }
        .card-content p { color: #555; line-height: 1.5; }
        .card-footer {
            padding: 15px 20px;
            background: #fafafa;
            border-top: 1px solid #eee;
            text-align: right;
        }
        .btn {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" alt="Code">
            <div class="card-content">
                <h3>Card Title 1</h3>
                <p>This is a description inside a card. Cards are great for displaying discrete chunks of information.</p>
            </div>
            <div class="card-footer">
                <a href="#" class="btn">Learn More</a>
            </div>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1488590528505-98d2b5aba04b" alt="Laptop">
            <div class="card-content">
                <h3>Card Title 2</h3>
                <p>This layout uses flexbox to ensure cards are of equal height and contents are spaced perfectly.</p>
            </div>
            <div class="card-footer">
                <a href="#" class="btn">Learn More</a>
            </div>
        </div>
    </div>
</body>
</html>

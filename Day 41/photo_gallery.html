<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photo Gallery Layout</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eee; padding: 20px; }
        h1 { text-align: center; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 15px;
        }
        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .gallery img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>My Photo Gallery</h1>
    <div class="gallery">
        <img src="https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0" alt="Landscape 1">
        <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e" alt="Landscape 2">
        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b" alt="Landscape 3">
        <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba" alt="Landscape 4">
        <img src="https://images.unsplash.com/photo-1433086966358-54859d0ed716" alt="Landscape 5">
        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e" alt="Landscape 6">
    </div>
</body>
</html>
